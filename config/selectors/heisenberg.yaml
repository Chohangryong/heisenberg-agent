# heisenberg.kr selector profile
# Version tracked in articles.selector_profile_version
version: "selector.v2"

list_page:
  article_card: "div.loop-list > div.content"
  title: "h3.title > a"
  url: "h3.title > a"                         # href attribute
  author: "p.author"                           # in .post-meta
  category: "p.category"                       # text format: "카테고리|날짜"
  tags: "p.tag a"
  excerpt: "div.excerpt"

detail_page:
  title: "div.single-header h1"
  meta_info: "div.single-header .meta .info"   # text format: "카테고리|날짜"
  content_area: "div.single-content"

sections:
  researcher_profile: "div.content-profile"
  one_minute_summary: "div.content-summary"
  main_body: "div.content-chapter"
  researcher_opinion: "div.content-opinion"
  like: "div.content-like"
  comments: "div.content-reference"
  contact: "div.content-contact"
  tag: "div.content-tag"

# Access tier is encoded in content-block class names
# e.g. content-free, content-standard, content-business, content-vip, content-vvip
access_tier_class_map:
  "content-free": "free"
  "content-standard": "standard"
  "content-business": "business"
  "content-vip": "vip"
  "content-vvip": "vvip"

# Patterns for detecting gated notices (in text)
gated_notice_patterns:
  - "스탠다드 등급 이상"
  - "비즈니스 등급 이상"
  - "VIP 등급 이상"
  - "VVIP 등급 이상"

# Access tier detection: maps gate text to tier
access_tier_map:
  "스탠다드 등급 이상": "standard"
  "비즈니스 등급 이상": "business"
  "VIP 등급 이상": "vip"
  "VVIP 등급 이상": "vvip"
